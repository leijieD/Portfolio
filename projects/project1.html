<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目标题 1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f3ee;
      color: #111;
    }
    .topbar {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: rgba(245, 243, 238, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      z-index: 10;
    }
    .topbar a {
      color: #111;
      text-decoration: none;
      font-size: 14px;
    }
    .pdf-wrap {
      width: 100%;
      height: calc(100vh - 58px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html">← Back</a>
    <a href="../pdfs/project1.pdf" target="_blank">Open PDF</a>
  </div>

  <div class="pdf-wrap">
    <iframe src="../pdfs/project1.pdf"></iframe>
  </div>
</body>
</html>
